<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>签到管理</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>签到管理</h1>
      <p class="subtitle">照片库管理与签到记录</p>
    </header>

    <!-- 登录 -->
    <section id="loginSection" class="card">
      <h2>管理员登录</h2>
      <input id="username" type="text" placeholder="用户名" value="admin">
      <input id="password" type="password" placeholder="密码" value="admin123">
      <button id="btnLogin" class="btn primary">登录</button>
    </section>

    <!-- 管理面板 -->
    <section id="adminPanel" hidden>
      <div class="tabs">
        <button class="tab active" data-tab="faces">照片库</button>
        <button class="tab" data-tab="records">签到记录</button>
      </div>

      <div id="tabFaces" class="card tab-content">
        <h2>录入人脸</h2>
        <input id="faceName" type="text" placeholder="姓名">
        <input id="faceEmployeeNo" type="text" placeholder="工号/学号">
        <input id="facePhoto" type="file" accept="image/*">
        <button id="btnAddFace" class="btn primary">添加</button>
        <ul id="faceList" class="list"></ul>
      </div>

      <div id="tabRecords" class="card tab-content" hidden>
        <h2>签到记录</h2>
        <input id="recordDate" type="date">
        <button id="btnLoadRecords" class="btn secondary">查询</button>
        <ul id="recordList" class="list"></ul>
      </div>

      <button id="btnLogout" class="btn secondary">退出登录</button>
    </section>

    <footer>
      <a href="index.html">返回签到页</a>
    </footer>
  </div>
  <script src="js/admin.js"></script>
</body>
</html>
