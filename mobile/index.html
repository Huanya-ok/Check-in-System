<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>人脸签到</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>人脸签到</h1>
      <p class="subtitle">对准面部拍照即可完成签到（无需登录）</p>
    </header>

    <div class="camera-area">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" hidden></canvas>
      <img id="preview" hidden alt="预览">
    </div>

    <div class="actions">
      <button id="btnCapture" class="btn primary">拍照签到</button>
      <button id="btnRetake" class="btn secondary" hidden>重拍</button>
      <label class="btn secondary">
        从相册选择
        <input type="file" id="fileInput" accept="image/*" capture="user" hidden>
      </label>
    </div>

    <div id="result" class="result" hidden></div>

    <nav class="nav-links">
      <a href="login.html">登录</a>
      <a href="register.html">注册</a>
      <a href="records.html">我的记录</a>
      <a href="dashboard.html">教师总览</a>
    </nav>
  </div>
  <script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checkin.js"></script>
</body>
</html>
