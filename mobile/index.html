<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>人脸签到</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>人脸签到</h1>
      <p class="subtitle">对准面部拍照即可完成签到（无需登录）</p>
    </header>

    <div class="camera-area">
      <div class="camera-placeholder" id="cameraPlaceholder" hidden>
        <div class="placeholder-icon">📷</div>
        <p class="placeholder-text">点击下方「启动摄像头」<br>或从相册选择照片</p>
      </div>

      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" hidden></canvas>
      <img id="preview" hidden alt="预览">
    </div>

    <div class="actions">
      <button id="btnCamera" class="btn secondary">启动摄像头</button>
      <button id="btnCapture" class="btn primary" disabled>拍照签到</button>
      <button id="btnRetake" class="btn secondary" hidden>重拍</button>
      <label class="btn secondary">
        从相册选择
        <input type="file" id="fileInput" accept="image/*" capture="user" hidden>
      </label>
    </div>

    <div id="result" class="result" hidden></div>

    <nav class="nav-links" id="navLinks">
      <!-- 导航链接将根据登录状态动态生成 -->
    </nav>
  </div>
  <script src="js/config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checkin.js"></script>
  <script>
    // 根据登录状态和角色动态生成导航链接
    (function() {
      const navLinks = document.getElementById('navLinks');
      let links = '';
      
      if (!isLoggedIn()) {
        // 未登录状态：仅显示登录和注册
        links += '<a href="login.html">登录</a>';
        links += '<a href="register.html">注册</a>';
      } else {
        // 已登录状态：显示我的记录
        links += '<a href="records.html">我的记录</a>';
        
        // 如果是教师，额外显示教师总览
        if (isTeacher()) {
          links += '<a href="dashboard.html">教师总览</a>';
        }
        
        // 添加注销链接
        links += '<a href="#" onclick="handleLogout(); return false;">注销</a>';
      }
      
      navLinks.innerHTML = links;
    })();
    
    // 处理注销
    async function handleLogout() {
      await logout();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
