<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>用户登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>用户登录</h1>
      <p class="subtitle">登录后可查看本人签到记录</p>
    </header>

    <section class="card">
      <input id="username" type="text" placeholder="用户名" autocomplete="username">
      <input id="password" type="password" placeholder="密码" autocomplete="current-password">
      <button id="btnLogin" class="btn primary" type="button">登录</button>
      <div id="result" class="result" hidden></div>
    </section>

    <nav class="nav-links">
      <a href="register.html">没有账号？去注册</a>
      <a href="index.html">返回签到</a>
    </nav>
  </div>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
